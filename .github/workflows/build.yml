name: Build iOS IPA (Development - Sideload)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      # -------------------------------------------------
      # Checkout repository
      # -------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(find /Applications -maxdepth 1 -name "Xcode*.app" | sort | tail -1)
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project EnsWilde.xcodeproj

      # -------------------------------------------------
      # Setup temporary keychain
      # -------------------------------------------------
      - name: Setup keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

      # -------------------------------------------------
      # Import signing certificate
      # -------------------------------------------------
      - name: Import certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

      # -------------------------------------------------
      # Install provisioning profile
      # -------------------------------------------------
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PP_UUID=$UUID" >> $GITHUB_ENV

      # -------------------------------------------------
      # Archive
      # -------------------------------------------------
      - name: Build archive
        run: |
          xcodebuild clean archive \
            -project EnsWilde.xcodeproj \
            -scheme EnsWilde \
            -configuration Release \
            -archivePath $PWD/build/EnsWilde.xcarchive \
            -destination "generic/platform=iOS"

      # -------------------------------------------------
      # Export IPA
      # -------------------------------------------------
      - name: Export IPA
        run: |
          cat <<EOF > exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.royerlraph79</key>
                  <string>$PP_UUID</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $PWD/build/EnsWilde.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath $PWD/build

      # -------------------------------------------------
      # Upload IPA artifact
      # -------------------------------------------------
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: EnsWilde-IPA
          path: build/*.ipa
